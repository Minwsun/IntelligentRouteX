<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteChain AI Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1e2022; }
        #map { width: 100%; height: 100%; background: #1e2022; }
        /* NO CSS filter — Esri Dark Gray tiles are dark by design */
        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom {
            border: none !important; margin-right: 16px !important; margin-bottom: 80px !important;
        }
        .leaflet-control-zoom a {
            background: rgba(29,32,34,0.85) !important; color: #99f7ff !important;
            border: 1px solid rgba(70,72,74,0.3) !important;
            width: 32px !important; height: 32px !important; line-height: 32px !important;
        }
        .leaflet-control-zoom a:hover { background: rgba(29,32,34,0.95) !important; }
        .driver-dot { border-radius: 50%; cursor: pointer; }
        .driver-idle {
            background: #00ffab;
            box-shadow: 0 0 6px rgba(0,255,171,0.6), 0 0 12px rgba(0,255,171,0.2);
        }
        .driver-busy {
            background: #99f7ff;
            box-shadow: 0 0 6px rgba(153,247,255,0.6), 0 0 12px rgba(153,247,255,0.2);
        }
        .order-dot {
            border-radius: 50%; background: rgba(255,113,108,0.45);
            box-shadow: 0 0 2px rgba(255,113,108,0.2);
        }
        .driver-tooltip {
            background: rgba(29,32,34,0.9) !important; border: 1px solid rgba(153,247,255,0.3) !important;
            color: #99f7ff !important; font-family: 'Segoe UI', monospace;
            font-size: 10px !important; padding: 3px 8px !important;
            border-radius: 4px !important; box-shadow: 0 2px 8px rgba(0,0,0,0.5) !important;
        }
        .leaflet-tooltip-top::before { border-top-color: rgba(153,247,255,0.3) !important; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
(function() {
    'use strict';

    // ════════════════════════════════════════════════════════════════════
    // 1. MAP INSTANCE — created ONCE, preferCanvas for performance
    // ════════════════════════════════════════════════════════════════════
    var map = L.map('map', {
        center: [10.7769, 106.7009], zoom: 13,
        minZoom: 11, maxZoom: 17,
        preferCanvas: true,
        zoomControl: true, attributionControl: false,
        zoomAnimation: true, fadeAnimation: true,
        markerZoomAnimation: true, inertia: true,
        inertiaDeceleration: 3000, inertiaMaxSpeed: 1500,
        zoomSnap: 0.5, zoomDelta: 1,
        wheelPxPerZoomLevel: 120,
        wheelDebounceTime: 80
    });
    map.setMaxBounds(L.latLngBounds([10.60, 106.50], [10.95, 106.90]));

    // ── Esri Dark Gray Base (natively dark — NO CSS filter needed) ──
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 17, minZoom: 11,
        keepBuffer: 3,
        updateWhenZooming: false,
        updateWhenIdle: false
    }).addTo(map);

    // ── Esri Dark Gray Reference (labels on top of base) ──
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Reference/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 17, minZoom: 11,
        keepBuffer: 3,
        updateWhenZooming: false,
        updateWhenIdle: false
    }).addTo(map);

    // ════════════════════════════════════════════════════════════════════
    // 2. PERSISTENT LAYER STATE — never cleared, only patched
    // ════════════════════════════════════════════════════════════════════
    var driverMarkers = {};       // id -> L.marker (persistent, only setLatLng)
    var orderMarkers = {};        // id -> L.marker
    var driverRouteLayers = {};   // driverId -> L.layerGroup
    var driverRouteHashes = {};   // driverId -> hash
    var trafficLayer = L.layerGroup().addTo(map);
    var weatherLayer = L.layerGroup().addTo(map);
    var roadNetLayer = L.layerGroup().addTo(map);
    var routeParent = L.layerGroup().addTo(map);
    var lastTrafficHash = '';
    var lastWeatherHash = '';

    // Animation state
    var driverPositions = {};     // id -> { cur:[lat,lng], tgt:[lat,lng], state, name }
    var lastAnimTime = 0;

    // ════════════════════════════════════════════════════════════════════
    // 3. PUBLIC API — defined immediately so Java can call anytime
    // ════════════════════════════════════════════════════════════════════
    window.appMap = {

        /**
         * Single entry point: apply a batch frame from Java.
         * Only patches data that is present in the frame.
         * NEVER rebuilds map/layers. Only moves markers and updates polylines.
         */
        applyFrame: function(frameJson) {
            try {
                var frame = (typeof frameJson === 'string') ? JSON.parse(frameJson) : frameJson;

                // ── Drivers: update animation targets ──────────────────
                if (frame.drivers && frame.drivers.features) {
                    var activeIds = {};
                    frame.drivers.features.forEach(function(f) {
                        var id = f.properties.id;
                        activeIds[id] = true;
                        var lat = f.geometry.coordinates[1];
                        var lng = f.geometry.coordinates[0];
                        var state = f.properties.state;
                        var name = f.properties.name || id;

                        if (driverPositions[id]) {
                            // Just update target — animation loop interpolates
                            driverPositions[id].tgt = [lat, lng];
                            driverPositions[id].state = state;
                            driverPositions[id].name = name;
                        } else {
                            // New driver: create marker + position state
                            driverPositions[id] = {
                                cur: [lat, lng], tgt: [lat, lng],
                                state: state, name: name
                            };
                            var isBusy = state !== 'ONLINE_IDLE';
                            var size = isBusy ? 12 : 8;
                            var cssClass = 'driver-dot ' + (isBusy ? 'driver-busy' : 'driver-idle');
                            var icon = L.divIcon({ className: cssClass, iconSize: [size, size], iconAnchor: [size/2, size/2] });
                            var marker = L.marker([lat, lng], { icon: icon, interactive: true, zIndexOffset: 1000 });
                            marker.bindTooltip(name, { className: 'driver-tooltip', direction: 'top', offset: [0, -8] });
                            marker.on('click', (function(did) {
                                return function() { if (window.javaBridge) window.javaBridge.onDriverSelected(did); };
                            })(id));
                            marker.addTo(map);
                            driverMarkers[id] = marker;
                        }
                    });
                    // Remove drivers no longer in frame
                    for (var id in driverPositions) {
                        if (!activeIds[id]) {
                            if (driverMarkers[id]) { map.removeLayer(driverMarkers[id]); delete driverMarkers[id]; }
                            delete driverPositions[id];
                        }
                    }
                }

                // ── Routes: per-driver differential update ─────────────
                if (frame.routes && frame.routes.features) {
                    var activeRouteIds = {};
                    frame.routes.features.forEach(function(f) {
                        if (f.geometry.type !== 'LineString') return;
                        var did = f.properties.driverId;
                        activeRouteIds[did] = true;
                        var coords = f.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });
                        if (coords.length < 2) return;

                        // Hash to detect changes
                        var hash = coords.length + '_' + coords[0][0].toFixed(4) + '_' + coords[coords.length-1][0].toFixed(4);
                        if (driverRouteHashes[did] === hash) return; // Unchanged
                        driverRouteHashes[did] = hash;

                        // Remove old route for this driver only
                        if (driverRouteLayers[did]) {
                            routeParent.removeLayer(driverRouteLayers[did]);
                        }
                        var group = L.layerGroup();
                        var isPickup = f.properties.phase === 'pickup';
                        var color = isPickup ? '#FFBE6B' : '#00ffab';
                        // Glow
                        L.polyline(coords, { color: color, weight: 8, opacity: 0.12 }).addTo(group);
                        // Main line
                        L.polyline(coords, {
                            color: color, weight: 3, opacity: 0.85,
                            dashArray: isPickup ? '8,5' : null,
                            lineCap: 'round', lineJoin: 'round'
                        }).addTo(group);
                        // Destination dot
                        var dest = coords[coords.length - 1];
                        L.circleMarker(dest, {
                            radius: 5, color: '#fff', fillColor: color,
                            fillOpacity: 1, weight: 1.5, opacity: 0.8
                        }).addTo(group);
                        group.addTo(routeParent);
                        driverRouteLayers[did] = group;
                    });
                    // Remove routes for drivers no longer active
                    for (var did in driverRouteLayers) {
                        if (!activeRouteIds[did]) {
                            routeParent.removeLayer(driverRouteLayers[did]);
                            delete driverRouteLayers[did];
                            delete driverRouteHashes[did];
                        }
                    }
                }

                // ── Traffic: replace only if changed ───────────────────
                if (frame.traffic && frame.traffic.features) {
                    var th = frame.traffic.features.length + '_' + JSON.stringify(frame.traffic.features[0] || '').length;
                    if (th !== lastTrafficHash) {
                        lastTrafficHash = th;
                        trafficLayer.clearLayers();
                        frame.traffic.features.forEach(function(f) {
                            var sev = f.properties.severity || 0;
                            if (sev < 0.1) return;
                            var coords = f.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });
                            var color = sev > 0.7 ? '#d7383b' : sev > 0.4 ? '#ff716c' : '#ff9966';
                            L.polyline(coords, { color: color, weight: 3 + sev * 4, opacity: 0.4 + sev * 0.3 }).addTo(trafficLayer);
                        });
                    }
                }

                // ── Weather: replace only if changed ───────────────────
                if (frame.weather && frame.weather.features) {
                    var wh = frame.weather.features.length + '_' + JSON.stringify(frame.weather.features[0] || '').length;
                    if (wh !== lastWeatherHash) {
                        lastWeatherHash = wh;
                        weatherLayer.clearLayers();
                        frame.weather.features.forEach(function(f) {
                            var intensity = f.properties.intensity || 0;
                            if (intensity < 0.05) return;
                            var coords = f.geometry.coordinates[0].map(function(c) { return [c[1], c[0]]; });
                            L.polygon(coords, {
                                fillColor: '#6ebbee', fillOpacity: intensity * 0.10,
                                color: '#6ebbee', weight: 1, opacity: intensity * 0.25, dashArray: '6,4'
                            }).addTo(weatherLayer);
                        });
                    }
                }

                // ── Orders: full replace (only every 15 ticks) ─────────
                if (frame.orders && frame.orders.features) {
                    var activeOids = {};
                    frame.orders.features.forEach(function(f) {
                        var oid = f.properties.id;
                        activeOids[oid] = true;
                        if (!orderMarkers[oid]) {
                            var icon = L.divIcon({ className: 'order-dot', iconSize: [4, 4], iconAnchor: [2, 2] });
                            orderMarkers[oid] = L.marker(
                                [f.geometry.coordinates[1], f.geometry.coordinates[0]],
                                { icon: icon, interactive: false, zIndexOffset: -1000 }
                            ).addTo(map);
                        }
                    });
                    for (var oid in orderMarkers) {
                        if (!activeOids[oid]) {
                            map.removeLayer(orderMarkers[oid]);
                            delete orderMarkers[oid];
                        }
                    }
                }

                // ── Road network: one-time push ────────────────────────
                if (frame.roadNetwork && frame.roadNetwork.features) {
                    if (roadNetLayer.getLayers().length === 0) {
                        frame.roadNetwork.features.forEach(function(f) {
                            var coords = f.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });
                            L.polyline(coords, { color: '#4a5568', weight: 2, opacity: 0.4 }).addTo(roadNetLayer);
                        });
                    }
                }

            } catch(e) { console.error('applyFrame:', e); }
        },

        toggleLayer: function(layerName, visible) {
            var layerMap = {
                'traffic': trafficLayer, 'weather': weatherLayer,
                'routes': routeParent
            };
            var layer = layerMap[layerName];
            if (layer) { if (visible) map.addLayer(layer); else map.removeLayer(layer); }
            if (layerName === 'drivers') {
                for (var id in driverMarkers) {
                    if (visible) driverMarkers[id].addTo(map); else map.removeLayer(driverMarkers[id]);
                }
            }
        },

        focusDriver: function(id) {
            if (driverPositions[id]) map.setView(driverPositions[id].cur, 15);
        },

        centerMap: function(lat, lng, zoom) {
            map.setView([lat, lng], zoom || 13);
        }
    };

    // ════════════════════════════════════════════════════════════════════
    // 4. DRIVER ANIMATION LOOP — smooth interpolation every frame
    // ════════════════════════════════════════════════════════════════════
    lastAnimTime = performance.now();
    function animateDrivers(now) {
        var dt = now - lastAnimTime;
        lastAnimTime = now;

        for (var id in driverPositions) {
            var dp = driverPositions[id];
            if (dp.cur[0] !== dp.tgt[0] || dp.cur[1] !== dp.tgt[1]) {
                var t = Math.min(1.0, dt / 400);
                dp.cur[0] += (dp.tgt[0] - dp.cur[0]) * t;
                dp.cur[1] += (dp.tgt[1] - dp.cur[1]) * t;
                if (Math.abs(dp.cur[0] - dp.tgt[0]) < 0.0000005 &&
                    Math.abs(dp.cur[1] - dp.tgt[1]) < 0.0000005) {
                    dp.cur[0] = dp.tgt[0]; dp.cur[1] = dp.tgt[1];
                }
            }
            // Update Leaflet marker position (no recreate!)
            var marker = driverMarkers[id];
            if (marker) {
                marker.setLatLng([dp.cur[0], dp.cur[1]]);
                // Update icon style if state changed
                var isBusy = dp.state !== 'ONLINE_IDLE';
                var el = marker._icon;
                if (el) {
                    var newClass = 'driver-dot ' + (isBusy ? 'driver-busy' : 'driver-idle');
                    var size = isBusy ? 12 : 8;
                    if (el.className.indexOf(newClass) === -1) {
                        el.className = 'leaflet-marker-icon ' + newClass + ' leaflet-zoom-animated leaflet-interactive';
                        el.style.width = size + 'px'; el.style.height = size + 'px';
                        el.style.marginLeft = (-size/2) + 'px'; el.style.marginTop = (-size/2) + 'px';
                    }
                }
            }
        }
        requestAnimationFrame(animateDrivers);
    }
    requestAnimationFrame(animateDrivers);

    // Notify Java
    setTimeout(function() { if (window.javaBridge) window.javaBridge.onMapReady(); }, 500);
})();
</script>
</body>
</html>
