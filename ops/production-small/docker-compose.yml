services:
  kafka:
    image: bitnami/kafka:3.8
    container_name: routechain-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: routechain-production-small-cluster
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka

  flink-jobmanager:
    image: flink:1.20.1-scala_2.12-java17
    container_name: routechain-flink-jobmanager
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    ports:
      - "8081:8081"
    depends_on:
      - kafka

  flink-taskmanager:
    image: flink:1.20.1-scala_2.12-java17
    container_name: routechain-flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    depends_on:
      - flink-jobmanager

  redis:
    image: redis:7-alpine
    container_name: routechain-redis
    ports:
      - "6379:6379"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: routechain-keycloak
    command: start-dev --http-port=8080 --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123
    ports:
      - "8088:8080"
    volumes:
      - ./keycloak/routechain-demo-realm.json:/opt/keycloak/data/import/routechain-demo-realm.json:ro

  postgis:
    image: postgis/postgis:16-3.4
    container_name: routechain-postgis
    environment:
      POSTGRES_DB: routechain
      POSTGRES_USER: routechain
      POSTGRES_PASSWORD: routechain
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: routechain-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: routechain
      MINIO_ROOT_PASSWORD: routechain123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: routechain-iceberg-rest
    environment:
      CATALOG_WAREHOUSE: s3://routechain-lakehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: routechain
      AWS_SECRET_ACCESS_KEY: routechain123
      AWS_REGION: ap-southeast-1
    ports:
      - "8181:8181"
    depends_on:
      - minio

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: routechain-clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  neo4j:
    image: neo4j:5.26-community
    container_name: routechain-neo4j
    environment:
      NEO4J_AUTH: neo4j/routechain123
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  mlflow:
    build:
      context: ./mlflow
    container_name: routechain-mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

volumes:
  kafka-data:
  postgis-data:
  minio-data:
  clickhouse-data:
  mlflow-data:
  neo4j-data:
