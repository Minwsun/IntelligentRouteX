version: "3.9"

services:
  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"

  kafka:
    image: bitnami/kafka:3.7
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_PORT:-9092}
    ports:
      - "${KAFKA_PORT:-9092}:9092"

  redis:
    image: redis:7.2
    ports:
      - "${REDIS_PORT:-6379}:6379"

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-routechain}
      POSTGRES_USER: ${POSTGRES_USER:-routechain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-routechain}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-routechain}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-routechain123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_TCP_PORT:-9002}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  flink-jobmanager:
    image: flink:1.20-scala_2.12-java17
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    ports:
      - "${FLINK_UI_PORT:-8081}:8081"

  flink-taskmanager:
    image: flink:1.20-scala_2.12-java17
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

  mlflow:
    image: python:3.11-slim
    command: >
      bash -lc "pip install --no-cache-dir mlflow psycopg2-binary boto3 &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-routechain}:${POSTGRES_PASSWORD:-routechain}@postgres:5432/${POSTGRES_DB:-routechain}
      --artifacts-destination s3://${MLFLOW_BUCKET:-routechain-mlflow}"
    depends_on:
      - postgres
      - minio
    ports:
      - "${MLFLOW_PORT:-5000}:5000"

volumes:
  postgres_data:
  minio_data:
  clickhouse_data:
