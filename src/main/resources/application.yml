spring:
  application:
    name: routechain-api
server:
  port: 8081
management:
  health:
    neo4j:
      enabled: false
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
springdoc:
  swagger-ui:
    path: /swagger-ui.html
routechain:
  security:
    enabled: false
  persistence:
    jdbc:
      enabled: false
      url: jdbc:postgresql://localhost:5432/routechain
      username: routechain
      password: routechain
      driver-class-name: org.postgresql.Driver
      max-pool-size: 8
      min-idle: 1
      connection-timeout-ms: 10000
    redis:
      enabled: false
      host: localhost
      port: 6379
      password: ""
      database: 0
      key-prefix: routechain
      connect-timeout-ms: 2000
      driver-presence-ttl: 2m
  runtime:
    idempotency:
      stale-ttl: 5s
      wait-timeout: 2s
      poll-interval-ms: 25
    offers:
      decline-cooldown: 30s
      expiry-cooldown: 45s
  outbox:
    enabled: false
    bootstrap-servers: localhost:9092
    client-id: routechain-outbox-relay
    topic-prefix: ""
    batch-size: 25
    poll-interval-ms: 1000
    stale-claim-ttl-ms: 30000
    retry-backoff-ms: 2000
    publish-timeout-ms: 5000
