spring:
  config:
    activate:
      on-profile: dispatch-v2-fallback

routechain:
  dispatch-v2:
    enabled: true
    ml-enabled: false
    sidecar-required: false
    selector-ortools-enabled: true
    warm-start-enabled: true
    hot-start-enabled: true
    tomtom-enabled: false
    open-meteo-enabled: false
    weather:
      enabled: false
    traffic:
      enabled: false
    ml:
      tabular:
        enabled: false
      routefinder:
        enabled: false
      greedrl:
        enabled: false
      forecast:
        enabled: false
    feedback:
      storage-mode: FILE
      base-dir: data/dispatch-v2-feedback
    performance:
      telemetry-enabled: true
      budget-enforcement-enabled: false
