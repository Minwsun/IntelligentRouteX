<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteChain AI Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0c0e10; }
        #map { width: 100%; height: 100%; background: #0c0e10; }

        /* Smooth tile + zoom transitions */
        .leaflet-tile-container { -webkit-transform-style: flat !important; transform-style: flat !important; }
        .leaflet-tile { -webkit-backface-visibility: visible !important; backface-visibility: visible !important; }
        .leaflet-zoom-anim .leaflet-zoom-animated {
            -webkit-transition: -webkit-transform 0.25s cubic-bezier(0,0,0.25,1) !important;
            transition: transform 0.25s cubic-bezier(0,0,0.25,1) !important;
        }

        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom {
            border: none !important; margin-right: 16px !important; margin-bottom: 80px !important;
        }
        .leaflet-control-zoom a {
            background: rgba(29,32,34,0.85) !important; color: #99f7ff !important;
            border: 1px solid rgba(70,72,74,0.3) !important;
            width: 32px !important; height: 32px !important; line-height: 32px !important; font-size: 16px !important;
        }
        .leaflet-control-zoom a:hover { background: rgba(29,32,34,0.95) !important; }

        .driver-dot { border-radius: 50%; cursor: pointer; }
        .driver-idle {
            background: #00ffab;
            box-shadow: 0 0 6px rgba(0,255,171,0.6), 0 0 12px rgba(0,255,171,0.2);
        }
        .driver-busy {
            background: #99f7ff;
            box-shadow: 0 0 6px rgba(153,247,255,0.6), 0 0 12px rgba(153,247,255,0.2);
        }
        .order-dot {
            border-radius: 50%; background: rgba(255,113,108,0.45);
            box-shadow: 0 0 2px rgba(255,113,108,0.2);
        }
        .driver-tooltip {
            background: rgba(29,32,34,0.9) !important; border: 1px solid rgba(153,247,255,0.3) !important;
            color: #99f7ff !important; font-family: 'Segoe UI', monospace;
            font-size: 10px !important; padding: 3px 8px !important;
            border-radius: 4px !important; box-shadow: 0 2px 8px rgba(0,0,0,0.5) !important;
        }
        .leaflet-tooltip-top::before { border-top-color: rgba(153,247,255,0.3) !important; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
(function() {
    'use strict';

    var CENTER = [10.7769, 106.7009];
    var INIT_ZOOM = 13;
    var MIN_ZOOM = 12;
    var MAX_ZOOM = 15;

    var map = L.map('map', {
        center: CENTER, zoom: INIT_ZOOM,
        minZoom: MIN_ZOOM, maxZoom: MAX_ZOOM,
        zoomControl: true, attributionControl: false,
        zoomAnimation: true, fadeAnimation: true,
        markerZoomAnimation: true, inertia: true,
        inertiaDeceleration: 3000,
        zoomSnap: 1, zoomDelta: 1,
        wheelPxPerZoomLevel: 120
    });
    map.setMaxBounds(L.latLngBounds([10.65, 106.55], [10.92, 106.85]));

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
        subdomains: 'abcd', maxZoom: 18, minZoom: MIN_ZOOM,
        keepBuffer: 6, updateWhenZooming: true, updateWhenIdle: false
    }).addTo(map);

    // ── State ───────────────────────────────────────────────────────────
    var driverMarkers = {};
    var orderMarkers = {};
    var trafficLines = L.layerGroup().addTo(map);
    var weatherZones = L.layerGroup().addTo(map);
    var routeLines = L.layerGroup().addTo(map);    // Parent for all route sub-groups
    var roadNetwork = L.layerGroup().addTo(map);
    var heatLayer = null;

    // Per-driver route layer groups (no more clearLayers flicker!)
    var driverRouteLayers = {};  // driverId -> L.layerGroup
    var driverRouteHashes = {};  // driverId -> hash string
    var driverRoutes = {};       // driverId -> [[lat,lng],...] for snapping

    var layerVisibility = {
        traffic: true, weather: true, drivers: true, orderHeat: true, routes: true
    };

    // ── Route hashing (detect if route actually changed) ────────────────
    function routeHash(coords) {
        if (!coords || coords.length < 2) return '';
        var f = coords[0], l = coords[coords.length - 1];
        return coords.length + '_' + f[0].toFixed(4) + '_' + f[1].toFixed(4)
               + '_' + l[0].toFixed(4) + '_' + l[1].toFixed(4);
    }

    // ── Snap driver position to nearest point on OSRM route ─────────────
    function snapToRoute(pos, route) {
        if (!route || route.length < 2) return pos;
        var minDist = Infinity, closest = pos;
        for (var i = 0; i < route.length - 1; i++) {
            var a = route[i], b = route[i + 1];
            var dx = b[0] - a[0], dy = b[1] - a[1];
            var lenSq = dx * dx + dy * dy;
            var t = lenSq === 0 ? 0 : Math.max(0, Math.min(1, ((pos[0] - a[0]) * dx + (pos[1] - a[1]) * dy) / lenSq));
            var sx = a[0] + t * dx, sy = a[1] + t * dy;
            var d = (pos[0] - sx) * (pos[0] - sx) + (pos[1] - sy) * (pos[1] - sy);
            if (d < minDist) { minDist = d; closest = [sx, sy]; }
        }
        return Math.sqrt(minDist) < 0.004 ? closest : pos;
    }

    // ── Public API ──────────────────────────────────────────────────────
    window.appMap = {

        updateDriver: function(id, lat, lng, state, name) {
            // Snap to OSRM route if available
            if (driverRoutes[id] && driverRoutes[id].length > 1) {
                var snapped = snapToRoute([lat, lng], driverRoutes[id]);
                lat = snapped[0]; lng = snapped[1];
            }

            var isBusy = state !== 'ONLINE_IDLE';
            var cssClass = 'driver-dot ' + (isBusy ? 'driver-busy' : 'driver-idle');
            var size = isBusy ? 12 : 8;

            if (driverMarkers[id]) {
                driverMarkers[id].setLatLng([lat, lng]);
                var el = driverMarkers[id]._icon;
                if (el) {
                    el.className = 'leaflet-marker-icon ' + cssClass + ' leaflet-zoom-animated leaflet-interactive';
                    el.style.width = size + 'px'; el.style.height = size + 'px';
                    el.style.marginLeft = (-size/2) + 'px'; el.style.marginTop = (-size/2) + 'px';
                }
            } else {
                var icon = L.divIcon({ className: cssClass, iconSize: [size, size], iconAnchor: [size/2, size/2] });
                var marker = L.marker([lat, lng], { icon: icon, interactive: true, zIndexOffset: 1000 });
                marker.bindTooltip(name || id, { className: 'driver-tooltip', direction: 'top', offset: [0, -8] });
                marker.on('click', function() { if (window.javaBridge) window.javaBridge.onDriverSelected(id); });
                marker.addTo(map);
                driverMarkers[id] = marker;
            }
        },

        removeDriver: function(id) {
            if (driverMarkers[id]) { map.removeLayer(driverMarkers[id]); delete driverMarkers[id]; }
            delete driverRoutes[id];
            if (driverRouteLayers[id]) { routeLines.removeLayer(driverRouteLayers[id]); delete driverRouteLayers[id]; }
            delete driverRouteHashes[id];
        },

        addOrder: function(id, lat, lng) {
            if (orderMarkers[id]) return;
            var icon = L.divIcon({ className: 'order-dot', iconSize: [4, 4], iconAnchor: [2, 2] });
            orderMarkers[id] = L.marker([lat, lng], { icon: icon, interactive: false, zIndexOffset: -1000 }).addTo(map);
        },

        removeOrder: function(id) {
            if (orderMarkers[id]) { map.removeLayer(orderMarkers[id]); delete orderMarkers[id]; }
        },

        // ── Routes — per-driver differential update (NO flicker) ────────
        setRoutes: function(geojsonStr) {
            try {
                var data = JSON.parse(geojsonStr);
                if (!data.features) return;

                var activeIds = {};

                data.features.forEach(function(f) {
                    var did = f.properties.driverId;
                    activeIds[did] = true;

                    var coords = f.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });
                    if (coords.length < 2) return;

                    // Always store route for snapping
                    driverRoutes[did] = coords;

                    // Check if this route actually changed
                    var hash = routeHash(coords);
                    if (driverRouteHashes[did] === hash) return; // Same route, skip redraw
                    driverRouteHashes[did] = hash;

                    // Remove old route layers for this driver
                    if (driverRouteLayers[did]) {
                        routeLines.removeLayer(driverRouteLayers[did]);
                    }

                    if (!layerVisibility.routes) return;

                    // Create new route layers for this driver
                    var group = L.layerGroup();
                    var isPickup = f.properties.phase === 'pickup';
                    var color = isPickup ? '#FFBE6B' : '#00ffab';

                    // Glow
                    L.polyline(coords, { color: color, weight: 8, opacity: 0.1 }).addTo(group);
                    // Main line
                    L.polyline(coords, {
                        color: color, weight: 3, opacity: 0.8,
                        dashArray: isPickup ? '8,5' : null,
                        lineCap: 'round', lineJoin: 'round'
                    }).addTo(group);
                    // Destination
                    var dest = coords[coords.length - 1];
                    L.circleMarker(dest, {
                        radius: 5, color: '#fff', fillColor: color,
                        fillOpacity: 1, weight: 1.5, opacity: 0.8
                    }).addTo(group);

                    group.addTo(routeLines);
                    driverRouteLayers[did] = group;
                });

                // Remove routes for drivers no longer active
                Object.keys(driverRouteLayers).forEach(function(id) {
                    if (!activeIds[id]) {
                        routeLines.removeLayer(driverRouteLayers[id]);
                        delete driverRouteLayers[id];
                        delete driverRouteHashes[id];
                        delete driverRoutes[id];
                    }
                });

            } catch(e) { console.error('setRoutes', e); }
        },

        setRoadNetwork: function(geojsonStr) {
            try {
                roadNetwork.clearLayers();
                var data = JSON.parse(geojsonStr);
                if (!data.features) return;
                data.features.forEach(function(f) {
                    var coords = f.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });
                    L.polyline(coords, { color: '#4a5568', weight: 2, opacity: 0.4 }).addTo(roadNetwork);
                });
            } catch(e) { console.error('setRoadNetwork', e); }
        },

        setTraffic: function(geojsonStr) {
            try {
                trafficLines.clearLayers();
                if (!layerVisibility.traffic) return;
                var data = JSON.parse(geojsonStr);
                if (!data.features) return;
                data.features.forEach(function(f) {
                    var severity = f.properties.severity || 0;
                    if (severity < 0.1) return;
                    var coords = f.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });
                    var color = severity > 0.7 ? '#d7383b' : severity > 0.4 ? '#ff716c' : '#ff9966';
                    L.polyline(coords, { color: color, weight: 3 + severity * 4, opacity: 0.4 + severity * 0.3 }).addTo(trafficLines);
                });
            } catch(e) { console.error('setTraffic', e); }
        },

        setWeatherZones: function(geojsonStr) {
            try {
                weatherZones.clearLayers();
                if (!layerVisibility.weather) return;
                var data = JSON.parse(geojsonStr);
                if (!data.features) return;
                data.features.forEach(function(f) {
                    var intensity = f.properties.intensity || 0;
                    if (intensity < 0.1) return;
                    var coords = f.geometry.coordinates[0].map(function(c) { return [c[1], c[0]]; });
                    L.polygon(coords, {
                        fillColor: '#6ebbee', fillOpacity: intensity * 0.10,
                        color: '#6ebbee', weight: 1, opacity: intensity * 0.25, dashArray: '6,4'
                    }).addTo(weatherZones);
                });
            } catch(e) { console.error('setWeatherZones', e); }
        },

        setOrderHeat: function(geojsonStr) {
            try {
                if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
                if (!layerVisibility.orderHeat) return;
                var data = JSON.parse(geojsonStr);
                if (!data.features || data.features.length === 0) return;
                var points = data.features.map(function(f) {
                    return [f.geometry.coordinates[1], f.geometry.coordinates[0], 0.5];
                });
                heatLayer = L.heatLayer(points, {
                    radius: 25, blur: 15, maxZoom: 17,
                    gradient: {
                        0.2: 'rgba(153,247,255,0.3)', 0.4: 'rgba(0,255,171,0.5)',
                        0.6: 'rgba(255,190,107,0.6)', 0.8: 'rgba(255,113,108,0.7)',
                        1.0: 'rgba(215,56,59,0.9)'
                    }
                }).addTo(map);
            } catch(e) { console.error('setOrderHeat', e); }
        },

        toggleLayer: function(layerName, visible) {
            layerVisibility[layerName] = visible;
            if (layerName === 'traffic') { if (visible) map.addLayer(trafficLines); else map.removeLayer(trafficLines); }
            if (layerName === 'weather') { if (visible) map.addLayer(weatherZones); else map.removeLayer(weatherZones); }
            if (layerName === 'routes') { if (visible) map.addLayer(routeLines); else map.removeLayer(routeLines); }
            if (layerName === 'orderHeat' && heatLayer) { if (visible) map.addLayer(heatLayer); else map.removeLayer(heatLayer); }
            if (layerName === 'drivers') {
                Object.keys(driverMarkers).forEach(function(id) {
                    if (visible) driverMarkers[id].addTo(map); else map.removeLayer(driverMarkers[id]);
                });
            }
        },

        centerMap: function(lat, lng, zoom) { map.setView([lat, lng], zoom || 13); },
        focusDriver: function(id) { if (driverMarkers[id]) map.setView(driverMarkers[id].getLatLng(), 15); }
    };

    setTimeout(function() { if (window.javaBridge) window.javaBridge.onMapReady(); }, 500);
})();
</script>
</body>
</html>
