spring:
  config:
    activate:
      on-profile: dispatch-v2-prod

routechain:
  dispatch-v2:
    enabled: true
    ml-enabled: true
    sidecar-required: true
    selector-ortools-enabled: true
    warm-start-enabled: true
    hot-start-enabled: true
    tomtom-enabled: true
    open-meteo-enabled: true
    weather:
      enabled: true
    traffic:
      enabled: true
    ml:
      tabular:
        enabled: true
      routefinder:
        enabled: true
      greedrl:
        enabled: true
      forecast:
        enabled: true
    feedback:
      storage-mode: FILE
      base-dir: data/dispatch-v2-feedback
    performance:
      telemetry-enabled: true
      budget-enforcement-enabled: false
