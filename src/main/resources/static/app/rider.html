<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="/app/map-app.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/app/map-common.js"></script>
</head>
<body>
<main class="map-app">
    <aside class="map-sidebar">
        <section class="map-panel">
            <p class="eyebrow">Rider Map</p>
            <h2>Place an order</h2>
            <div class="field-grid">
                <label>Customer ID <input id="customerId" value="cust-demo"></label>
                <label>Merchant ID <input id="merchantId" value="merchant-demo"></label>
                <label>Service Tier
                    <select id="serviceTier">
                        <option value="instant" selected>instant</option>
                        <option value="2h">2h</option>
                    </select>
                </label>
                <label>Promised ETA Minutes <input id="etaMinutes" type="number" value="30"></label>
            </div>
            <p class="muted">Click the map: first click sets pickup, second click sets dropoff.</p>
            <div class="button-row">
                <button id="createOrderButton">Create Order</button>
                <button class="secondary" id="refreshSnapshotButton">Refresh Snapshot</button>
                <button class="ghost" id="resetPinsButton">Reset Pins</button>
            </div>
        </section>

        <section class="map-panel">
            <h3>Trip Status</h3>
            <p id="tripStatus" class="status-chip">idle</p>
            <p id="tripMeta" class="muted">No active trip yet.</p>
            <div class="timeline" id="tripTimeline"></div>
        </section>

        <section class="map-panel">
            <h3>Nearby Drivers</h3>
            <div id="nearbyDrivers" class="list"></div>
        </section>
    </aside>

    <section class="map-surface">
        <div id="map"></div>
        <div class="map-overlay">
            <div class="map-badge" id="selectedPins">Pickup: not set, Dropoff: not set</div>
            <div class="map-badge"><a href="/app/driver.html">Switch to Driver</a></div>
        </div>
    </section>
</main>

<script>
    const state = RouteChainMapApp.createMap("map");
    let pickup = null;
    let dropoff = null;
    let activeOrderId = "";
    let socket = null;

    function updatePinText() {
        document.getElementById("selectedPins").textContent =
            `Pickup: ${pickup ? `${pickup.lat.toFixed(4)}, ${pickup.lng.toFixed(4)}` : "not set"}, ` +
            `Dropoff: ${dropoff ? `${dropoff.lat.toFixed(4)}, ${dropoff.lng.toFixed(4)}` : "not set"}`;
    }

    function renderNearby(drivers) {
        const root = document.getElementById("nearbyDrivers");
        root.innerHTML = "";
        (drivers || []).forEach(driver => {
            const item = document.createElement("div");
            item.className = "list-item";
            item.innerHTML = `<strong>${driver.driverId}</strong><br>${driver.state}<br>${driver.distanceKm.toFixed(2)} km`;
            root.appendChild(item);
        });
    }

    function renderTrip(trip) {
        const status = document.getElementById("tripStatus");
        const meta = document.getElementById("tripMeta");
        const timeline = document.getElementById("tripTimeline");
        timeline.innerHTML = "";
        if (!trip) {
            status.textContent = "idle";
            meta.textContent = "No active trip yet.";
            return;
        }
        status.textContent = trip.stage;
        meta.innerHTML = `Order ${trip.orderId} &middot; ${trip.serviceTier} &middot; Driver ${trip.assignedDriverId || "searching"}`;
        [trip.status, trip.stage, trip.offerBatchId || "no_offer_batch", `eta ${trip.etaMinutes || 0}m`].forEach(step => {
            const row = document.createElement("span");
            row.textContent = step;
            timeline.appendChild(row);
        });
    }

    async function refreshSnapshot() {
        const customerId = document.getElementById("customerId").value.trim();
        if (!customerId) {
            return;
        }
        const snapshot = await RouteChainMapApp.fetchJson(`/v1/user/map-snapshot?customerId=${encodeURIComponent(customerId)}&orderId=${encodeURIComponent(activeOrderId)}`);
        RouteChainMapApp.drawSnapshot(state, snapshot);
        renderNearby(snapshot.nearbyDrivers);
        if (activeOrderId) {
            const trip = await RouteChainMapApp.fetchJson(`/v1/user/orders/${encodeURIComponent(activeOrderId)}/tracking`);
            renderTrip(trip);
        }
    }

    async function createOrder() {
        if (!pickup || !dropoff) {
            alert("Set pickup and dropoff first.");
            return;
        }
        const customerId = document.getElementById("customerId").value.trim();
        const payload = {
            customerId,
            pickupRegionId: "pickup-r1",
            dropoffRegionId: "drop-r9",
            pickupLat: pickup.lat,
            pickupLng: pickup.lng,
            dropoffLat: dropoff.lat,
            dropoffLng: dropoff.lng,
            serviceTier: document.getElementById("serviceTier").value,
            promisedEtaMinutes: Number(document.getElementById("etaMinutes").value),
            merchantId: document.getElementById("merchantId").value.trim()
        };
        const created = await RouteChainMapApp.fetchJson("/v1/user/orders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        activeOrderId = created.orderId;
        connectUserStream();
        await refreshSnapshot();
    }

    function connectUserStream() {
        const customerId = document.getElementById("customerId").value.trim();
        if (!customerId) {
            return;
        }
        if (socket) {
            socket.close();
        }
        socket = RouteChainMapApp.connectSocket(`/v1/user/stream?customerId=${encodeURIComponent(customerId)}`, async () => {
            await refreshSnapshot();
        });
    }

    state.map.on("click", event => {
        if (!pickup) {
            pickup = event.latlng;
        } else if (!dropoff) {
            dropoff = event.latlng;
        } else {
            pickup = event.latlng;
            dropoff = null;
            activeOrderId = "";
            renderTrip(null);
        }
        updatePinText();
        refreshSnapshot().catch(console.error);
    });

    document.getElementById("createOrderButton").addEventListener("click", () => createOrder().catch(error => alert(error.message)));
    document.getElementById("refreshSnapshotButton").addEventListener("click", () => refreshSnapshot().catch(error => alert(error.message)));
    document.getElementById("resetPinsButton").addEventListener("click", () => {
        pickup = null;
        dropoff = null;
        activeOrderId = "";
        updatePinText();
        renderTrip(null);
        RouteChainMapApp.drawSnapshot(state, { nearbyDrivers: [], routePolyline: [] });
    });

    connectUserStream();
    updatePinText();
    refreshSnapshot().catch(console.error);
</script>
</body>
</html>
